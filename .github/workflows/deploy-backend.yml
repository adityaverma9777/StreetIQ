name: Deploy Backend to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Download Environment Variables from S3
      run: |
        aws s3 cp s3://${{ secrets.S3_ENV_BUCKET_NAME }}/.env ./backend/.env
        
    - name: Generate Deployment Package
      run: |
        cd backend
        zip -r deploy.zip . -x "node_modules/**"
        
    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v22
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: StreetIQ-Backend
        environment_name: StreetIQ-Backend-env
        version_label: "backend-${{ github.sha }}"
        region: ${{ secrets.AWS_REGION }}
        deployment_package: backend/deploy.zip
        use_existing_version_if_available: true
